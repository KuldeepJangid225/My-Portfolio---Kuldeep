<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Kuldeep Jangid</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
      /* BODY */
   * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

   
    body {
background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#111827);
background-size:400% 400%;
animation:gradient 12s ease infinite;
color:#fff;
overflow-x:hidden;
    }

    .page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
.logo{font-size:28px;font-weight:700;color:#38bdf8}
  nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 2%;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.08);
border-bottom:1px solid rgba(255,255,255,.1);
z-index:1000;
}
    nav h2 {
      color: #fff;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    nav a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
    }
    nav ul li a i {
      margin-right: 6px;
      color: #38bdf8;
    }
    .menu-toggle {
      display: none;
      font-size: 24px;
      cursor: pointer;
      color: #38bdf8;
    }

    
.footer{
    margin-top:80px;
    padding:30px;
    text-align:center;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    color:#fff;
}

.footer .social-links a{
    color:#38bdf8;
    margin:0 10px;
    font-size:24px;
    transition:.3s;
}

.footer .social-links a:hover{
    color:#fff;
}
    .main-content {
      padding: 30px 20px;
    }

    .form-container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .form-container h1 {
      text-align: center;
      color: #283593;
    }

    form label {
      font-weight: bold;
      display: block;
      margin: 12px 0 6px;
      color: #333;
    }

    form input, form textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    form textarea {
      resize: vertical;
      min-height: 100px;
    }

    form button {
      background-color: #283593;
      color: #fff;
      border: none;
      padding: 12px 20px;
      margin-top: 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    form button:hover {
      background-color: #1a237e;
    }

   
@media (max-width:768px){

    nav ul{
        display:none;
        flex-direction:column;
        gap:15px;
        width:100%;
        background:#0f172a;
        padding:20px;
        position:absolute;
        top:80px;
        left:0;
    }

    nav ul.active{
        display:flex;
    }

    nav ul a{
        color:#fff;
    }

    .menu-toggle{
        display:block;
    }

    .hero{
        flex-direction:column-reverse;
        text-align:center;
        gap:30px;
        padding:40px 20px;
    }

    .hero-right{
        width:250px;
        height:250px;
    }

    .hero-left h1{
        font-size:28px;
    }

    .section-title{
        font-size:32px;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <nav>
<div class="logo">Kuldeep Jangid</div>
      <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
      </div>
      <ul id="nav-links">
        <li><a href="index.html"><i class="fas fa-home"></i>Home</a></li>
        <li><a href="about.html"><i class="fas fa-user"></i>About</a></li>
        <li><a href="resume.html"><i class="fas fa-graduation-cap"></i>Resume</a></li>
        <li><a href="project.html"><i class="fas fa-project-diagram"></i>Projects</a></li>
        <li><a href="contact.html"><i class="fas fa-envelope"></i>Contact</a></li>
      </ul>
    </nav>


  <!-- Main Content -->
  <div class="main-content">
    <div class="form-container">
      <h1>Contact Me</h1>
      <form action="https://formspree.io/f/xjkovvke" method="post">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required />

        <label for="message">Your Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

     <footer class="footer">
      <div class="footer-content">
        <h2>Kuldeep Jangid</h2>
        <div class="social-links">
          <a href="https://www.youtube.com" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
          <a href="https://www.linkedin.com/in/kuldeep-jangid-jaipur/" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
          <a href="mailto:kj623178@gmail.com" title="Gmail"><i class="fa-solid fa-envelope"></i></a>
          <a href="tel:+916376778170" title="Phone"><i class="fa-solid fa-phone"></i></a>
        </div>
      </div>
    </footer>
    </div>
  <!-- JS for Mobile Toggle -->
  <script>
    function toggleMenu() {
      const nav = document.getElementById('nav-links');
      nav.classList.toggle('active');
    }
  </script>

</body>
</html>
